<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZCLAP Admin</title>
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <link rel="shortcut icon" href="/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="/favicon.png?v=2" />
  <style>
    :root {
      --orange: #e8490f;
      --dark: #1a1a1a;
      --mid: #555555;
      --bg: #f7f6f2;
      --card: #ffffff;
      --border: #e0ded8;
      --green: #0f7a32;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --dark: #f3f4f6;
        --mid: #b7bdc7;
        --bg: #0f1216;
        --card: #171c22;
        --border: #2a3038;
        --green: #7fd9a1;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--dark); }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 0;
      min-height: 0;
    }
    .brand img { display: block; height: 30px; width: auto; }
    .brand-text { color: var(--dark); font-size: 12px; font-weight: 700; letter-spacing: 0.03em; }
    .toolbar { display: flex; align-items: center; gap: 12px; color: var(--mid); font-size: 13px; }
    .btn {
      border: 1px solid #1a1a1a;
      background: #1a1a1a;
      color: #ffffff;
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn:hover { opacity: 0.92; }
    .btn-approve { border: 0; background: var(--orange); color: #fff; height: 32px; padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
    main { max-width: 1040px; margin: 24px auto; padding: 0 16px 30px; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .sub { color: var(--mid); margin-bottom: 20px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
    .tab { border: 1px solid var(--border); background: var(--card); border-radius: 999px; padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--mid); }
    .tab.active { border-color: var(--orange); color: var(--orange); background: #fff4ef; }
    .list { display: grid; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .row { display: flex; flex-wrap: wrap; gap: 14px; margin: 6px 0; font-size: 13px; color: var(--mid); }
    .top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .status, .status-email { display: inline-block; border-radius: 999px; padding: 3px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .status.pending { background: #fff3db; color: #8a5a00; }
    .status.done { background: #e8f7ed; color: var(--green); }
    .status-email.queued { background: #e9f2ff; color: #185fa5; }
    .status-email.not_sent { background: #fff3db; color: #8a5a00; }
    .status-email.sent { background: #e8f7ed; color: var(--green); }
    .status-email.undelivered { background: #fcebeb; color: #a32d2d; }
    .email-error {
      color: #a32d2d;
      font-size: 12px;
      margin-top: 2px;
    }
    .empty { color: var(--mid); font-size: 14px; background: var(--card); border: 1px dashed var(--border); border-radius: 12px; padding: 18px; }
    @media (prefers-color-scheme: dark) {
      .btn {
        border-color: #f3f4f6;
        background: #f3f4f6;
        color: #12161b;
      }
    }
    /* ── Review Modal ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%; max-width: 900px;
      max-height: 92vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .modal-header h2 { margin: 0; font-size: 16px; }
    .modal-header .meta { font-size: 12px; color: var(--mid); margin-top: 3px; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--mid); line-height: 1; padding: 0; }
    .modal-body {
      display: flex; flex: 1; overflow: hidden; min-height: 0;
    }
    .modal-inputs {
      flex: 1; overflow-y: auto; padding: 20px 20px 20px 20px;
      border-right: 1px solid var(--border);
    }
    .modal-result {
      width: 230px; min-width: 230px; padding: 20px 16px;
      background: var(--bg);
      display: flex; flex-direction: column; gap: 0;
      overflow-y: auto;
    }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px; align-items: center;
    }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--mid); height: 34px; padding: 0 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-cancel:hover { border-color: var(--mid); }
    /* Input form */
    .rv-section { margin-bottom: 18px; }
    .rv-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid); margin-bottom: 8px; }
    .rv-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; }
    .rv-check { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
    .rv-check input { cursor: pointer; }
    .rv-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 10px; }
    .rv-row label { font-size: 13px; color: var(--dark); flex: 1; }
    .rv-row input[type=number], .rv-row select {
      width: 100px; height: 32px; padding: 0 8px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; color: var(--dark); background: var(--card);
    }
    .rv-row select { width: 180px; }
    /* Result panel */
    .res-block { margin-bottom: 16px; }
    .res-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid); margin-bottom: 4px; }
    .res-value { font-size: 22px; font-weight: 700; color: var(--dark); line-height: 1.2; }
    .res-sub { font-size: 12px; color: var(--mid); margin-top: 2px; }
    .res-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .res-final { background: var(--orange); border-radius: 8px; padding: 12px; margin-top: 4px; }
    .res-final .res-eyebrow { color: rgba(255,255,255,0.8); }
    .res-final .res-value { color: #fff; font-size: 20px; }
    .res-final .res-sub { color: rgba(255,255,255,0.75); }
    .contingency-input { display: flex; align-items: center; gap: 6px; }
    .contingency-input input { width: 64px; height: 32px; padding: 0 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-weight: 600; font-family: inherit; color: var(--dark); background: var(--card); }
    .contingency-input span { font-size: 14px; color: var(--mid); }
    @media (max-width: 640px) {
      .modal-body { flex-direction: column; }
      .modal-result { width: 100%; border-right: none; border-top: 1px solid var(--border); }
      .modal-inputs { border-right: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="ZCLAP Admin home">
      <img src="/logo.png" alt="ZCLAP" />
      <span class="brand-text">ADMIN</span>
    </a>
    <div class="toolbar">
      <span id="whoami">Checking session...</span>
      <button class="btn" id="logout-btn">Log out</button>
    </div>
  </header>

  <main>
    <h1>Estimator Requests</h1>
    <div class="sub">Pending and completed approval queue.</div>

    <div class="tabs">
      <button class="tab active" data-tab="pending">Pending</button>
      <button class="tab" data-tab="done">Done</button>
    </div>
    <div id="pending-list" class="list"></div>
    <div id="done-list" class="list" style="display:none"></div>
  </main>

  <!-- Review Modal -->
  <div class="modal-overlay hidden" id="review-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h2 id="rv-title">Review Request</h2>
          <div class="meta" id="rv-meta"></div>
        </div>
        <button class="modal-close" onclick="closeReview()" title="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-inputs" id="rv-inputs"></div>
        <div class="modal-result" id="rv-result"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeReview()">Cancel</button>
        <button class="btn-approve" id="rv-approve-btn" style="height:34px;padding:0 16px;font-size:13px;" onclick="submitReview()">Approve & Finalise →</button>
      </div>
    </div>
  </div>

  <script>
    let data = { pending: [], done: [] };
    const esc = (v) => String(v).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");

    async function requireSession() {
      const res = await fetch("/api/admin/session");
      if (!res.ok) { window.location.href = "/admin/login"; return null; }
      const body = await res.json();
      document.getElementById("whoami").textContent = body.user.email;
      return body.user;
    }

    function requestCard(item) {
      const created = new Date(item.createdAt).toLocaleString();
      const approvedAt = item.approvedAt ? new Date(item.approvedAt).toLocaleString() : "-";
      const source = item.source || {};
      const user = item.user || {};
      const locationParts = [source.geo_city, source.geo_region, source.geo_country].filter(Boolean);
      const locationText = locationParts.length ? locationParts.join(", ") : "Unknown";
      const approveBtn = item.status === "pending"
        ? `<button class="btn-approve" style="background:var(--bg);color:var(--dark);border:1px solid var(--border);margin-right:6px" data-review-id="${esc(item.id)}">Review</button>`
        : "";
      const pdfBtn = `<button class="btn-approve" style="background:none;color:var(--mid);border:1px solid var(--border);margin-right:6px" data-pdf-id="${esc(item.id)}" title="Download PDF">⬇ PDF</button>`;
      const doneMeta = item.status === "done" ? `<div class="row"><span>Approved by: ${esc(item.approvedBy || "-")}</span><span>Approved at: ${esc(approvedAt)}</span></div>` : "";
      const emailStatus = item.emailStatus || "queued";
      const emailErrorMeta = emailStatus === "undelivered" && item.emailError
        ? `<div class="row"><span class="email-error">Delivery error: ${esc(item.emailError)}</span></div>`
        : "";
      return `<article class="card">
        <div class="top-row">
          <div><span class="status ${esc(item.status)}">${esc(item.status)}</span><strong style="margin-left:8px">${esc(item.id)}</strong></div>
          <div style="display:flex;align-items:center;">${approveBtn}${pdfBtn}</div>
        </div>
        <div class="row"><span><strong>${esc(user.firstName || "")} ${esc(user.lastName || "")}</strong></span><span>${esc(user.company || "-")}</span><span>${esc(user.email || "-")}</span></div>
        <div class="row"><span>Created: ${esc(created)}</span><span>Source: ${esc(source.utm_source || "direct")}</span><span>Email: <span class="status-email ${esc(emailStatus)}">${esc(emailStatus)}</span></span></div>
        <div class="row"><span>Location: ${esc(locationText)}</span><span>Timezone: ${esc(source.geo_timezone || "-")}</span></div>
        <div class="row"><span>${esc(item.estimateText || "-")}</span></div>
        ${emailErrorMeta}
        ${doneMeta}
      </article>`;
    }

    function renderList(id, items, emptyText) {
      const root = document.getElementById(id);
      root.innerHTML = items.length ? items.map(requestCard).join("") : `<div class="empty">${esc(emptyText)}</div>`;
    }

    async function loadRequests() {
      const res = await fetch("/api/admin/requests");
      if (!res.ok) {
        if (res.status === 401) { window.location.href = "/admin/login"; return; }
        throw new Error("Unable to load requests");
      }
      data = await res.json();
      renderList("pending-list", data.pending || [], "No pending requests.");
      renderList("done-list", data.done || [], "No completed requests.");
      bindApproveButtons();
      bindReviewButtons();
      bindPdfButtons();
    }

    function bindApproveButtons() {
      // kept for direct approve if ever needed
    }

    function bindReviewButtons() {
      [...document.querySelectorAll("[data-review-id]")].forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-review-id");
          const item = (data.pending || []).find(r => r.id === id);
          if (item) openReview(item);
        });
      });
    }

    function bindPdfButtons() {
      [...document.querySelectorAll("[data-pdf-id]")].forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-pdf-id");
          const original = btn.textContent;
          btn.textContent = "Generating…";
          btn.disabled = true;
          try {
            const res = await fetch(`/api/admin/pdf?id=${encodeURIComponent(id)}`);
            if (!res.ok) throw new Error(await res.text());
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `ZCLAP-MDM-Estimate-${id}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
          } catch (err) {
            alert("PDF generation failed: " + err.message);
          } finally {
            btn.textContent = original;
            btn.disabled = false;
          }
        });
      });
    }

    // ── Calc (mirrors estimator calc() exactly) ──────────────────
    function roundToStep(n, step) { return Math.round(Number(n || 0) / step) * step; }

    function calcFromInputs(inp, estimatorType) {
      const ootbN = (inp.ootb || []).length;
      const custN = Number(inp.customEnt || 0);
      const totalEnt = ootbN + custN;
      const relN = Number(inp.rels || 0);
      const hierN = Number(inp.hierarchies || 0);
      const bOut = Number(inp.consumers || 0);
      const rtIn = Number(inp.rtSources || 0);
      const rtOut = Number(inp.rtConsumers || 0);
      const daas = Number(inp.daas || 0);
      const createWkfl = Number(inp.createWkfl || 0);
      const isModernization = estimatorType === 'modernization';

      const migMap = { 'Load by business ID': 1, 'Merge by old ID': 2, 'New match/merge': 3 };
      const migrationOption = migMap[inp.legacyHandling] || 3;

      const baseBatchIn = Number(inp.sources || 0);
      const bIn = isModernization && migrationOption === 1 ? baseBatchIn + 1 : baseBatchIn;
      const matchFactor = isModernization ? (migrationOption === 3 ? 1 : 2) : 1;

      const volMap = { 'Less than 1 million': 0, '1 million to 10 million': 1, '10 million to 80 million': 2, 'Over 80 million': 3 };
      const volScore = volMap[inp.volume] || 0;

      const entInHrs = totalEnt * bIn * 32;
      const relInHrs = relN * bIn * 6;
      const hierInHrs = hierN * bIn * 12;
      const entOutHrs = totalEnt * bOut * 24;
      const relOutHrs = relN * bOut * 4;
      const hierOutHrs = hierN * bOut * 12;
      const rtInHrs = rtIn * totalEnt * 24;
      const rtOutHrs = rtOut * totalEnt * 32;
      const circlebacks = (createWkfl > 0 ? 1 : 0) * totalEnt * 40;
      const daasHrs = daas * 40;
      const profHrs = totalEnt * (bIn + rtIn) * 8;
      const custBuild = custN * 8;
      const matchHrs = totalEnt * matchFactor * 32;
      const layoutAndWorkflowHrs = (totalEnt * 1 * 6) + (totalEnt * 2 * 6) + (createWkfl * 10);
      const cdiHrs = entInHrs + relInHrs + hierInHrs + entOutHrs + relOutHrs + hierOutHrs + rtInHrs + rtOutHrs;
      const buildHrs = cdiHrs + circlebacks + daasHrs + profHrs + custBuild + matchHrs + layoutAndWorkflowHrs;

      const buildWks = Math.max(4, Math.ceil(buildHrs / 160));
      const designAndReqWks = Math.max(2, Math.round((buildHrs * (isModernization ? 0.30 : 0.35)) / 120));
      const testWks = Math.max(1, Math.round((buildHrs * (volScore < 2 ? 0.15 : 0.20)) / 160));
      const parallelWks = isModernization ? Math.max(2, Number(inp.parallelWeeks || 2)) : 0;
      const totalWks = designAndReqWks + buildWks + testWks + 1 + parallelWks;

      const rawSheetValue = (totalWks * 15 * 180) + (totalWks * 20 * 195) + (totalWks * 25 * 120)
        + (profHrs * 60) + (buildHrs * 0.28 * 60)
        + ((rtIn > 0 || rtOut > 0 ? totalWks * 10 : 0) * 120)
        + (cdiHrs * 60);
      const calibrationFactor = isModernization ? 1.2373 : 1.1993;
      const sheetValue = rawSheetValue * calibrationFactor;
      const low = roundToStep(sheetValue * 1.20, 5000);
      const high = roundToStep(sheetValue * 1.30, 5000);

      let rs = 0;
      if (volScore >= 2) rs += 2; else if (volScore === 1) rs += 1;
      if (rtIn > 2 || rtOut > 2) rs += 2; else if (rtIn > 0 || rtOut > 0) rs += 1;
      if (totalEnt > 6) rs += 2; else if (totalEnt > 3) rs += 1;
      if (relN > 6) rs += 1;
      if (bIn + bOut > 8) rs += 1;
      if (isModernization) rs += 1;
      if (isModernization && migrationOption !== 3) rs += 1;
      const risk = rs <= 2 ? 'Low' : rs <= 5 ? 'Medium' : 'High';

      return { low, high, totalWks, risk,
        lowFmt: '$' + low.toLocaleString(), highFmt: '$' + high.toLocaleString() };
    }

    // ── Review state ──────────────────────────────────────────────
    let rv = { item: null, inp: {}, type: '', contingency: 20 };

    function openReview(item) {
      rv.item = item;
      rv.type = item.estimatorType || item.estimator_type || 'implementation';
      rv.inp = JSON.parse(JSON.stringify(item.inputs || {}));
      rv.contingency = 20;

      const user = item.user || {};
      const fn = item.firstName || item.first_name || user.firstName || '';
      const ln = item.lastName  || item.last_name  || user.lastName  || '';
      const co = item.company   || user.company   || '';
      document.getElementById('rv-title').textContent = `Review: ${fn} ${ln}`.trim() || 'Review Request';
      document.getElementById('rv-meta').textContent  = [co, item.id].filter(Boolean).join(' · ');

      renderReviewInputs();
      updateReviewResult();
      document.getElementById('review-overlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeReview() {
      document.getElementById('review-overlay').classList.add('hidden');
      document.body.style.overflow = '';
      rv = { item: null, inp: {}, type: '', contingency: 20 };
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('review-overlay')) closeReview();
    }

    const OOTB_OPTIONS = ['Organization','Person','Supplier','Contact','Item','Category'];

    function renderReviewInputs() {
      const isMod = rv.type === 'modernization';
      const inp = rv.inp;

      let h = '';

      if (isMod) {
        h += `<div class="rv-section">
          <div class="rv-label">Modernization</div>
          <div class="rv-row"><label>Parallel testing weeks</label><input type="number" id="rv-parallelWeeks" min="2" max="16" value="${inp.parallelWeeks||2}" oninput="rvSet('parallelWeeks',+this.value)"></div>
          <div class="rv-row"><label>Legacy record handling</label>
            <select id="rv-legacyHandling" onchange="rvSet('legacyHandling',this.value)">
              <option ${inp.legacyHandling==='Load by business ID'?'selected':''}>Load by business ID</option>
              <option ${inp.legacyHandling==='Merge by old ID'?'selected':''}>Merge by old ID</option>
              <option ${(!inp.legacyHandling||inp.legacyHandling==='New match/merge')?'selected':''}>New match/merge</option>
            </select>
          </div>
        </div>`;
      }

      h += `<div class="rv-section">
        <div class="rv-label">OOTB Entities</div>
        <div class="rv-checkboxes">
          ${OOTB_OPTIONS.map(o => `<label class="rv-check"><input type="checkbox" value="${o}" ${(inp.ootb||[]).includes(o)?'checked':''} onchange="rvToggleOotb('${o}',this.checked)"> ${o}</label>`).join('')}
        </div>
      </div>`;

      const numRow = (id, label, min, max, val) =>
        `<div class="rv-row"><label>${label}</label><input type="number" id="rv-${id}" min="${min}" max="${max}" value="${val??0}" oninput="rvSet('${id}',+this.value)"></div>`;

      h += `<div class="rv-section">
        <div class="rv-label">Entities</div>
        ${numRow('customEnt','Custom entities',0,20,inp.customEnt)}
      </div>`;

      h += `<div class="rv-section">
        <div class="rv-label">Relationships &amp; Hierarchies</div>
        ${numRow('rels','Relationships',0,30,inp.rels)}
        ${numRow('hierarchies','Hierarchies',0,20,inp.hierarchies)}
      </div>`;

      h += `<div class="rv-section">
        <div class="rv-label">Source &amp; Consuming Systems</div>
        ${numRow('sources','Batch source systems',0,30,inp.sources)}
        ${numRow('rtSources','Real-time inbound sources',0,20,inp.rtSources)}
        ${numRow('consumers','Batch consumers',0,30,inp.consumers)}
        ${numRow('rtConsumers','Real-time consumers',0,20,inp.rtConsumers)}
      </div>`;

      h += `<div class="rv-section">
        <div class="rv-label">Workflows &amp; Volume</div>
        ${numRow('createWkfl','Entities with create workflows',0,20,inp.createWkfl)}
        <div class="rv-row"><label>Source record volume</label>
          <select onchange="rvSet('volume',this.value)">
            ${['Less than 1 million','1 million to 10 million','10 million to 80 million','Over 80 million'].map(v=>`<option ${inp.volume===v?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>`;

      h += `<div class="rv-section">
        <div class="rv-label">Data Cleansing / Enrichment</div>
        ${numRow('daas','DaaS / enrichment services',0,10,inp.daas)}
      </div>`;

      document.getElementById('rv-inputs').innerHTML = h;
    }

    function rvSet(key, val) {
      rv.inp[key] = val;
      updateReviewResult();
    }

    function rvToggleOotb(name, checked) {
      rv.inp.ootb = rv.inp.ootb || [];
      if (checked) { if (!rv.inp.ootb.includes(name)) rv.inp.ootb.push(name); }
      else { rv.inp.ootb = rv.inp.ootb.filter(o => o !== name); }
      updateReviewResult();
    }

    function updateReviewResult() {
      const r = calcFromInputs(rv.inp, rv.type);
      const pct = Number(document.getElementById('rv-contingency')?.value ?? rv.contingency) || 0;
      rv.contingency = pct;
      const finalLow  = Math.round(r.low  * (1 + pct / 100) / 5000) * 5000;
      const finalHigh = Math.round(r.high * (1 + pct / 100) / 5000) * 5000;
      const fmtK = n => '$' + n.toLocaleString();

      document.getElementById('rv-result').innerHTML = `
        <div class="res-block">
          <div class="res-eyebrow">T&amp;M Base</div>
          <div class="res-value">${r.lowFmt} – ${r.highFmt}</div>
          <div class="res-sub">${r.totalWks} wks · ${r.risk} complexity</div>
        </div>
        <hr class="res-divider">
        <div class="res-block">
          <div class="res-eyebrow">Fixed Price Contingency</div>
          <div class="contingency-input">
            <input type="number" id="rv-contingency" min="0" max="100" value="${pct}" oninput="updateReviewResult()">
            <span>%</span>
          </div>
        </div>
        <hr class="res-divider">
        <div class="res-final">
          <div class="res-eyebrow">Final Quoted Price</div>
          <div class="res-value">${fmtK(finalLow)} – ${fmtK(finalHigh)}</div>
          <div class="res-sub">${r.totalWks} wks estimated</div>
        </div>`;
    }

    async function submitReview() {
      if (!rv.item) return;
      const btn = document.getElementById('rv-approve-btn');
      btn.disabled = true; btn.textContent = 'Approving...';

      const r = calcFromInputs(rv.inp, rv.type);
      const pct = rv.contingency || 0;
      const finalLow  = Math.round(r.low  * (1 + pct / 100) / 5000) * 5000;
      const finalHigh = Math.round(r.high * (1 + pct / 100) / 5000) * 5000;

      try {
        const res = await fetch('/api/admin/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            requestId:       rv.item.id,
            reviewedInputs:  rv.inp,
            reviewedOutputs: { ...r },
            contingencyPct:  pct,
            finalLow,
            finalHigh,
          }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || 'Unable to approve');
        }
        closeReview();
        await loadRequests();
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Approve & Finalise →';
        alert(err.message || 'Unable to approve request');
      }
    }

    function bindTabs() {
      const tabs = [...document.querySelectorAll(".tab")];
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const isPending = tab.dataset.tab === "pending";
          document.getElementById("pending-list").style.display = isPending ? "grid" : "none";
          document.getElementById("done-list").style.display = isPending ? "none" : "grid";
        });
      });
    }

    async function logout() {
      await fetch("/api/admin/logout", { method: "POST" });
      window.location.href = "/admin/login";
    }

    async function init() {
      bindTabs();
      document.getElementById("logout-btn").addEventListener("click", logout);
      const user = await requireSession();
      if (!user) return;
      await loadRequests();
    }

    init().catch(() => {
      document.getElementById("pending-list").innerHTML = '<div class="empty">Error loading admin data. Refresh and try again.</div>';
    });
  </script>
</body>
</html>
