<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZCLAP Admin Login</title>
  <style>
    :root {
      --dark: #1a1a1a;
      --mid: #555555;
      --bg: #f7f6f2;
      --card: #ffffff;
      --border: #e0ded8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --dark: #f3f4f6;
        --mid: #b7bdc7;
        --bg: #0f1216;
        --card: #171c22;
        --border: #2a3038;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--dark);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    .brand {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 20px; color: var(--mid); font-size: 14px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--mid); }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      margin-bottom: 14px;
      background: var(--card);
      color: var(--dark);
    }
    button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.92; }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    @media (prefers-color-scheme: dark) {
      button {
        background: #f3f4f6;
        color: #12161b;
      }
    }
    .error {
      margin-top: 12px;
      color: #b32222;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">ZCLAP Admin</div>
    <h1>Internal Admin</h1>
    <p>Sign in to view pending requests and workflow status.</p>

    <form id="login-form">
      <label for="email">Email</label>
      <input id="email" type="email" required />

      <label for="password">Password</label>
      <input id="password" type="password" required />

      <button type="submit" id="submit-btn">Sign In</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errEl = document.getElementById("error-msg");
    const btn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          errEl.textContent = body.error || "Unable to sign in.";
          btn.disabled = false;
          btn.textContent = "Sign In";
          return;
        }
        window.location.href = "/admin";
      } catch (err) {
        errEl.textContent = "Network error. Please try again.";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
